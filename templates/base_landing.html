<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}bagtag.aero{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --bt-primary: #0d6efd;
      --bt-accent: #0dcaf0;
    }
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    .navbar-brand .dot { color: var(--bt-accent); }
    @media (max-width: 991.98px) {
      .navbar:has(#mainNav.show),
      .navbar:has(#mainNav.collapsing) {
        background: rgba(10, 14, 26, 0.97) !important;
        backdrop-filter: blur(8px);
      }
      #mainNav .navbar-nav {
        padding: .25rem 0 .75rem;
      }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-transparent position-absolute w-100" style="z-index:100;padding-top:1.25rem;padding-bottom:1.25rem">
  <div class="container">
    <a class="navbar-brand" href="/">
      <i class="bi bi-luggage me-1"></i>bagtag<span class="dot">.</span>aero
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
        <li class="nav-item"><a class="nav-link" href="/auth/login">Sign in</a></li>
        <li class="nav-item">
          <a class="btn btn-light btn-sm px-3 fw-semibold" href="/auth/register">Get started free</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
